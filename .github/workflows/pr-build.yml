name: PR Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /
          VITE_RESULTS_CSV_URL: /mock/results.csv
          VITE_WARD_STATUS_CSV_URL: /mock/ward_status.csv
          VITE_ELECTION_STATUS_CSV_URL: /mock/election_status.csv
          VITE_TURNOUT_CSV_URL: /mock/turnout.csv
          VITE_RACE_CONFIG_CSV_URL: /mock/race_config.csv
