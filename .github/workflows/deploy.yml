name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required CSV URLs
        env:
          VITE_RESULTS_CSV_URL: ${{ vars.VITE_RESULTS_CSV_URL }}
          VITE_WARD_STATUS_CSV_URL: ${{ vars.VITE_WARD_STATUS_CSV_URL }}
          VITE_ELECTION_STATUS_CSV_URL: ${{ vars.VITE_ELECTION_STATUS_CSV_URL }}
          VITE_TURNOUT_CSV_URL: ${{ vars.VITE_TURNOUT_CSV_URL }}
          VITE_RACE_CONFIG_CSV_URL: ${{ vars.VITE_RACE_CONFIG_CSV_URL }}
        run: |
          test -n "$VITE_RESULTS_CSV_URL" || (echo "Missing VITE_RESULTS_CSV_URL" && exit 1)
          test -n "$VITE_WARD_STATUS_CSV_URL" || (echo "Missing VITE_WARD_STATUS_CSV_URL" && exit 1)
          test -n "$VITE_ELECTION_STATUS_CSV_URL" || (echo "Missing VITE_ELECTION_STATUS_CSV_URL" && exit 1)
          test -n "$VITE_TURNOUT_CSV_URL" || (echo "Missing VITE_TURNOUT_CSV_URL" && exit 1)
          test -n "$VITE_RACE_CONFIG_CSV_URL" || (echo "Missing VITE_RACE_CONFIG_CSV_URL" && exit 1)

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          VITE_RESULTS_CSV_URL: ${{ vars.VITE_RESULTS_CSV_URL }}
          VITE_WARD_STATUS_CSV_URL: ${{ vars.VITE_WARD_STATUS_CSV_URL }}
          VITE_ELECTION_STATUS_CSV_URL: ${{ vars.VITE_ELECTION_STATUS_CSV_URL }}
          VITE_TURNOUT_CSV_URL: ${{ vars.VITE_TURNOUT_CSV_URL }}
          VITE_RACE_CONFIG_CSV_URL: ${{ vars.VITE_RACE_CONFIG_CSV_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
